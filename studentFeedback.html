<div class="container-fluid text-center dashboardContainer px-0">

    <!-------------Sidebar (Desktop)------------>

    <div class="col-md-3 d-none d-md-flex left ">
       <div class="upill"><div class="av">SD</div><div><div class="un">Student User</div><div class="ur"><span id="userName" class="username"></span></div></div></div>

   <button class="header-right-btn logoutBtn mt-auto mb-2" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign out </button>
    </div>

    <!-- Right Content Area (Dynamic Section) -->

    <div class="col-md-9  right p-3">
      <!-- Submit Feedback -->
      <form id="feedbackForm" class="feedbackForm">
        <h4 class="form-head">Submit Feedback</h4>

  <div class="feedbackFormTop">
  <label class="form-label">Rating</label>

  <div id="starRating" class="star-rating">
    <span data-value="1">★</span>
    <span data-value="2">★</span>
    <span data-value="3">★</span>
    <span data-value="4">★</span>
    <span data-value="5">★</span>
  </div>

</div>

  <div class="feedbackFormTopMiddle">
    <label class="form-label">Your Message</label>
    <textarea id="message" class="form-input" rows="4" placeholder="Write your feedback..." required></textarea>
  </div>

  <button class="form-btn mt-2">Submit Feedback</button>
</form>
<h5 class="mt-4 form-head">Your Feedback</h5>
<!-- List all Feedback Given-->
<div id="feedbackList" class="feedbackList mt-2"></div>
    </div>
   
  </div>
