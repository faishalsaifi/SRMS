    <div class="col-md-9 d-flex justify-content-start flex-column right p-3">
     <div class="form-container">
        <form action="#" class="add-form">
<h3 class="form-head">Add Result</h3>
<div class="form-grid">

  <div>
  <label for="email" class="input-label">Email</label>
    <input type="email" class="form-input" id="email" placeholder="Enter student email" required>
  </div>
  <div>
  <label for="studentName" class="input-label">Name</label>
    <input type="text" class="form-input" id="studentName" placeholder="Student Name" readonly >
  </div>
  <div>
      <label for="enroll" class="input-label"> Enrollment no.</label>
      <input type="text" id="enroll"  class="form-input" > 
  </div>
  
  
  
  <div>
      <div action="">
          <label for="course" class="input-label">Select Course:</label>
    <select id="course" class="form-input" onchange="updateSemesters()">
      <option value="">--Select Course--</option>
      
    </select>
  </div>
  </div>
  <div >
  <div class="resultForm" id="resultForm">
     <label for="semester" class="input-label">Select Semester:</label>
    <select id="semester" class="form-input" onchange="updateSubjects()">
      <option value="">--Select Semester--</option>
    </select>
  </div>
  </div>
  <div >
      <div class="resultForm">
    <label for="subject" class="input-label">Select Subject:</label>
    <select id="subject" class="form-input">
      
    </select>
  <input type="text" class="manualSub" id="manualSubject" placeholder="Enter subject manually" style="display: none;">
  </div>
  </div>
  <div>
    <label for="marks" class="input-label">Marks</label>
    <input type="number" id="marks" class="form-input">
  </div>
  <div>
    <label for="grade" class="input-label">Grade</label>
    <input type="text" id="grade" class="form-input" placeholder="e.g. A, B, C ,F" readonly>
  </div>
     
     <div class="button-box">
      <button type="submit" class="form-btn">Submit Result</button>
      <button type="reset" class="form-btn btn-cancel">Cancel</button>
    </div>
</div>
        </form>
     </div>
     <div class="table-section mt-5">
  <div class="table-wrapper">

      <table class="table table-bordered ">
        <thead>
          <tr >
            <th>Name</th>
            <th>Enrollment</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
            <th>Actions</th>
          </tr>
        </thead>
      

          <tbody id="resultTableBody" class="resultTable"></tbody>
    
      </table>
  </div>
