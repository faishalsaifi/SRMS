<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="studentDashboard.css">
<link rel="stylesheet" href="components.css">

<link rel="icon" type="image/png" href="assets/edutrack_favicon_c.svg">
    </head>
<body>
  <!-------------Onload Animation------------>
  <div class="onload" id="loaderShown">
      <div class="onload-text">
        <div class="wrap">
          <div class="radar-ring"></div>
          <div class="radar-ring2"></div>

          <img src="assets/edutrack_favicon_c.png" alt="" class="onload-img" style="height: 5rem; width: 5rem">
        </div>
    
      </div>
      <div class="onload-shutter"></div>
    </div>

      <!-------------Header (Desktop View)------------>

    <div class="header d-none d-md-grid">
       <div class="header-left">
            <div>
              <span class="header-title">Edutrack</span>
              <span class="header-sub">SRMS</span>

            </div>
        </div>
        <div class="header-right"><span>Dashboard</span></div>
       
    </div>
    
<!-------------Mobile Navigation------------>

    <nav class="navbar d-md-none">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <div>
         <span class="header-title">Edutrack</span>
              <span class="header-sub">SRMS</span>
      </div></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"><i class="fa-solid fa-bars"></i></span>
    </button>
    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Dashboard</h5>
        <button type="button" class="btn-close custom-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column">
        <!-------------Navbar Links------------>
        <ul class="navbar-nav flex-grow-1 pe-3 ">
         <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Main Category
            </a>
            <ul class="dropdown-menu">
              <li><a class="left-link active" href="#">Dashboard</a></li>
             
              
            </ul></li>
          
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Student
            </a>
            <ul class="dropdown-menu">
              <li><a class="left-link" href="viewCourse.html">View Courses</a></li>
              <li><a class="left-link" href="studentFeedback.html">Feedback</a></li>
              
              
            </ul></li>
            
          </ul>
          <ul class="navbar-nav">

<!-------------User Name and Sign Out wrapper(Mobile View)------------>

           <div class="upill">
              <div class="av">SD</div>
              <div>
                <div class="un">Student User</div>
                <div class="ur"><span id="userNameMob" class="username"></span></div></div>
                <div class="ms-auto">
                  <button class="header-right-btn logoutBtn" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out</button>
                </div>
              </div>
          </ul>
      </div>
    </div>
  </div>
</nav>

<!-------------Main Container for Content------------>

<div class="container-fluid text-center dashboardContainer position-relative px-0">
  <div class="row w-100 h-100 mx-0">

     <!-------------Sidebar (Desktop)------------>

    <div class="col-md-3 d-none d-md-flex left ">
       <div class="upill"><div class="av">SD</div><div><div class="un">Student User</div><div class="ur"><span id="userName" class="username"></span></div></div></div>
        
        <a href="dashboard.html" class="left-link mt-1 active"><span>⊞</span><span>Dashboard</span></a>
            <a href="viewCourse.html" class="left-link"><span>▣</span><span>Courses</span></a>
            <a href="studentFeedback.html" class="left-link"><span>◈</span><span>Feedback</span></a>
 <button class="header-right-btn logoutBtn mt-auto mb-2" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign out </button>
   
    </div>
    <!-- Right Content Area (Dynamic Section) -->
    <div class="col-md-9  right p-3">
       <div>
        <!-- My Result(Student Result) -->
        <div class="right-top">

            <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3L2 8L12 13L22 8L12 3Z" stroke="#7ab8f0" stroke-width="1.5" stroke-linejoin="round"></path>
            <path d="M2 16L12 21L22 16" stroke="#7ab8f0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M2 12L12 17L22 12" stroke="rgba(122,184,240,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
      <h4 class="form-head">My Results</h4>
        </div>
    <table class="dashTable table table-bordered mt-2">
      <thead>
        <tr>
          <th>Subject</th>
          <th>Marks</th>
          <th>Grade</th>
          <th>Semester</th>
        </tr>
      </thead>
      <tbody id="studentResultTable"></tbody>
    </table>
  </div>

  <!-- NOTIFICATIONS(From Admin Side) -->
  <div class="NotificationTab">
    <h4 class="form-head">Notifications</h4>
    <div id="studentNotifications"></div>
  </div>

    </div>
   
  </div>
</div>
<script src="studentDashboard.js"defer></script>
<script src="dashboard.js"defer></script>

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
<script src="https://kit.fontawesome.com/f44e101240.js" crossorigin="anonymous"></script>
</body>
</html>
