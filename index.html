<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="assets/edutrack_favicon_c.svg">
</head>
<body>
<!-- ===== Authentication Panel ===== -->
    <div class="panel p-none">
                  <div class="right-deco">
                  </div>
                  <div class="right-deco2">
                    
                  </div>
                   <!-- Role Selection (Student / Admin) -->
             <div class="role-container  text-center mb-3" id="roleContainer">

  <div class="role-toggle">
    <input type="radio" name="role" id="student" value="Student" checked>
    <label for="student"><i class="fa-solid fa-user-graduate"></i> Student</label>

    <input type="radio" name="role" id="admin" value="Admin">
    <label for="admin"><i class="fa-solid fa-user-shield"></i> Admin</label>

    <span class="role-slider"></span>
  </div>
</div>

 <!-- ===== Form Section ===== -->
<div class="form-parent">

  <!-- Tabs: Login / Signup -->
     <div class="tabs ">
<button id="loginTab" class="loginBtn active">Login</button>
<button id="signupTab">Signup</button>
</div>
<!-------------Login form------------>
    <div id="loginFormHtml" class="loginForm mt-3">

      <form>
        <label for="loginEmail" class="formLabel"><i class="fa-solid fa-envelope"></i> Your Email</label>
        <input type="email" id="loginEmail" class="formInput" required />
         <label for="loginPass" class="formLabel"><i class="fa-solid fa-key"></i> Enter your Password</label>
        <input type="password" id="loginPass" class="formInput" required />
       <div class="signUpLink">
        <div>
            Dont have an account?<button id="signUpBtn" class="signUpBtn"> SignUp</button>
        </div>
        <button type="submit" class="formBtn">Login</button>
      </div>
      <div>
        <span class="forgotText">Forgot password ?</span>
          <button class="forgot" id="forgot">Reset via OTP</button>
      </div>
      </form>
</div>

<!-------------Sign Up Form (OTP based verification) ------------>

<div id="signupForm" class="signupForm mt-3" style="display: none;">
 
  <form id="signupFormHtml">
  <label for="name" id="nameLab" class="formLabel"><i class="fa-solid fa-user-tie"></i> Your Full Name</label>
  <input type="text" id="name" name="name" class="formInput" required />

  <label for="email" id="emailLab" class="formLabel"><i class="fa-solid fa-envelope"></i> Your Email</label>
  <input type="email" id="email" name="email" class="formInput" required />
  <div id="adminPasskeyContainer" style="display:none;">
  <label class="formLabel"><i class="fa-solid fa-key"></i> Enter Admin Passkey</label>
  <input type="password" id="adminPasskey" class="formInput">
</div>

  <button type="button" id="sendOtpBtn" class="formBtn">Send OTP</button>
<label for="signUpOtp" id="signUpOtpLab" class="formLabel" style="display: none;"><i class="fa-solid fa-user-shield"></i> Enter OTP</label>
  <input type="text" id="signupOtp" class="formInput mt-2" style="display:none" />
  
  <label for="password" id="passLabel" class="formLabel" style="display: none;"><i class="fa-solid fa-key"></i> Enter your Password</label>
  <input type="password" id="password" name="password" class="formInput" required style="display:none" />

  <button type="submit" id="createAccountBtn" class="formBtn" style="display:none">Verify & Create Account</button>
</form></div>

<!-------------Forgot Password Form (OTP reset flow) ------------>

<div id="forgotForm" class="forgotForm" style="display: none;">
  <h2 class="form-head"><i class="fa-solid fa-unlock-keyhole"></i> Forgot Password ?</h2>
  <label for="forgotFormHtml" class="formLabel"><i class="fa-solid fa-envelope"></i> Enter Your email</label>
  <form id="forgotFormHtml">
  <input type="email" id="forgotEmail" class="formInput" />
  <input type="text" id="otp" class="formInput" placeholder="Enter OTP" style="display: none;" />
  <input type="password" class="formInput" id="newPassword" placeholder="New password" style="display: none;" />
  <button type="submit" class="formBtn">Submit</button>
</form>
</div>
</div>

</div>
    
           

    
   
    <script src="index.js"defer></script>
  

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
<script src="https://kit.fontawesome.com/f44e101240.js" crossorigin="anonymous"></script>
</body>
</html>
