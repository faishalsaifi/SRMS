      <!-- Course Container  -->
     <div class="container mt-4">
  <h3 class="form-head">Add Course</h3>

  <!-- Add Course Form -->
  <form id="courseForm" class="courseForm">
    <div>
        
        <input type="text" class="form-input" id="courseName" placeholder="Course Name" required>
        <input type="text" class="form-input"  id="courseCode" placeholder="Course Code" required>
        <input type="text" class="form-input"  id="duration" placeholder="Duration (e.g. 3 years)" required>
    </div>
    <div>

        <button type="submit" class="addCourseBtn mt-3">Add Course</button>
        <button type="reset" class="resetFormBtn mt-3">Cancel</button>
    </div>
  </form>
  <!-- Show Courses(List) -->
  <div class="courseCards mt-4" id="courseCards"></div>

  <hr>

<!-- EDIT COURSE MODAL -->
<div id="editCourseModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;">
  
  <div class="editCourseForm form-container" >
    <h4 class="form-head">Edit Course</h4>

    <input type="text" id="editCourseName" placeholder="Course Name" class="form-control form-input mb-2">

    <!-- 🔥 LOCKED CODE -->
    <input type="text" id="editCourseCode" class="form-control form-input mb-2" readonly>

    <input type="text" id="editCourseDuration" placeholder="Duration" class="form-control form-input mb-3">

    <div style="display:flex; gap:10px;">
      <button onclick="updateCourse()" class="form-btn">Save</button>
      <button onclick="closeEditModal()" class="form-btn btn-cancel">Cancel</button>
    </div>
  </div>

</div>
